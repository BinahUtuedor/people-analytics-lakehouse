version: "3.9"

services:

  ##########################################################################
  # PostgreSQL - Operational Database
  ##########################################################################

  postgres:

    image: postgres:17

    container_name: people_analytics_postgres

    restart: always

    environment:
      POSTGRES_DB: people_analytics
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres

    ports:
      # Host:Container
      # We use 5433 on host to avoid conflict with any local PostgreSQL installation
      - "5433:5432"

    volumes:
      # Persist PostgreSQL data
      - postgres_data:/var/lib/postgresql/data

    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

    networks:
      - analytics_net

  ##########################################################################
  # pgAdmin 4
  ##########################################################################

  pgadmin:

    image: dpage/pgadmin4:latest

    container_name: people_analytics_pgadmin

    restart: always

    depends_on:
      postgres:
        condition: service_healthy

    environment:
      PGADMIN_DEFAULT_EMAIL: admin@peopleanalytics.com
      PGADMIN_DEFAULT_PASSWORD: admin

    ports:
      - "5050:80"

    volumes:
      - pgadmin_data:/var/lib/pgadmin

    networks:
      - analytics_net


##########################################################################
# Future Services
##########################################################################

# airflow:
#   image: apache/airflow:2.9.0
#   ...

# spark:
#   image: bitnami/spark:3.5
#   ...

volumes:

  postgres_data:

  pgadmin_data:

networks:

  analytics_net:
    driver: bridge